<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHT — Smart Health Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06090b;
      --bg2:         #0c1014;
      --surface:     rgba(255,255,255,0.028);
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(255,255,255,0.14);
      --text:        #c8d8e8;
      --text-dim:    #5a7080;
      --text-hi:     #eaf4ff;
      --mono:        'Space Mono', monospace;
      --sans:        'Barlow Condensed', sans-serif;
      --low:         #00e676;
      --low-dim:     rgba(0,230,118,0.12);
      --med:         #ffab40;
      --med-dim:     rgba(255,171,64,0.12);
      --high:        #ff3b30;
      --high-dim:    rgba(255,59,48,0.14);
      --blue:        #29b6f6;
      --blue-dim:    rgba(41,182,246,0.08);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Background grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(41,182,246,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(41,182,246,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,9,11,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: baseline; gap: 14px; }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--blue);
      text-transform: uppercase;
    }

    .logo-sep { color: var(--text-dim); font-family: var(--mono); }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-hi);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .ws-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ws-badge.connected {
      color: var(--low);
      border: 1px solid rgba(0,230,118,0.25);
      background: rgba(0,230,118,0.06);
    }
    .ws-badge.disconnected {
      color: var(--high);
      border: 1px solid rgba(255,59,48,0.25);
      background: rgba(255,59,48,0.06);
    }
    .ws-badge.polling {
      color: var(--med);
      border: 1px solid rgba(255,171,64,0.25);
      background: rgba(255,171,64,0.06);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: pulse-anim 2s infinite;
    }
    .connected .pulse-dot { background: var(--low); }
    .polling .pulse-dot { background: var(--med); }
    .disconnected .pulse-dot { background: var(--high); animation: none; }

    @keyframes pulse-anim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .sys-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── Main layout ── */
    .main { padding: 28px 32px; }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Node grid ── */
    .node-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 900px) {
      .node-grid { grid-template-columns: 1fr; }
    }

    /* ── Node card ── */
    .node-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .node-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.7;
    }

    .node-card.risk-low   { --accent: var(--low);  border-color: rgba(0,230,118,0.15); }
    .node-card.risk-high  { --accent: var(--high); border-color: rgba(255,59,48,0.25); box-shadow: 0 0 30px rgba(255,59,48,0.06); }
    .node-card.risk-med   { --accent: var(--med);  border-color: rgba(255,171,64,0.2); }
    .node-card.offline    { --accent: var(--text-dim); }

    .node-card-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, var(--accent-bg, transparent), transparent 60%);
      pointer-events: none;
    }
    .node-card.risk-low  .node-card-bg { --accent-bg: rgba(0,230,118,0.04); }
    .node-card.risk-high .node-card-bg { --accent-bg: rgba(255,59,48,0.05); }
    .node-card.risk-med  .node-card-bg { --accent-bg: rgba(255,171,64,0.04); }

    .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .node-id-block { display: flex; flex-direction: column; gap: 4px; }

    .node-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .node-id {
      font-family: var(--mono);
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-hi);
      letter-spacing: -0.02em;
    }

    .node-status-block { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .live-indicator.online { color: var(--low); }
    .live-indicator.offline { color: var(--text-dim); }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--low);
    }
    .live-indicator.online .live-dot {
      animation: pulse-anim 1.5s infinite;
      box-shadow: 0 0 6px var(--low);
    }
    .live-indicator.offline .live-dot {
      background: var(--text-dim);
      animation: none;
    }

    .last-updated {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── Vitals ── */
    .vitals { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }

    .vital-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 3px;
    }

    .vital-left { display: flex; align-items: center; gap: 10px; }

    .vital-icon {
      font-size: 14px;
      width: 24px;
      text-align: center;
      filter: grayscale(0.3);
    }

    .vital-info { display: flex; flex-direction: column; gap: 1px; }

    .vital-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .vital-range {
      font-family: var(--mono);
      font-size: 8px;
      color: rgba(90,112,128,0.7);
    }

    .vital-value-block { display: flex; align-items: baseline; gap: 4px; }

    .vital-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-hi);
      letter-spacing: -0.02em;
      transition: color 0.4s;
    }

    .vital-unit {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .vital-value.anomaly { color: var(--high) !important; }
    .vital-value.warning { color: var(--med) !important; }

    /* ── Risk badge ── */
    .risk-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 3px;
      border: 1px solid;
      transition: all 0.4s;
    }

    .risk-badge.low  { background: var(--low-dim);  border-color: rgba(0,230,118,0.25);  color: var(--low);  }
    .risk-badge.med  { background: var(--med-dim);  border-color: rgba(255,171,64,0.25); color: var(--med);  }
    .risk-badge.high { background: var(--high-dim); border-color: rgba(255,59,48,0.3);   color: var(--high);
                       animation: risk-high-pulse 2s infinite; }
    .risk-badge.none { background: var(--blue-dim); border-color: rgba(41,182,246,0.15); color: var(--text-dim); }

    @keyframes risk-high-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
      50% { box-shadow: 0 0 16px 2px rgba(255,59,48,0.15); }
    }

    .risk-label-text {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .risk-level-text {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ── Alert log ── */
    .alert-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .alert-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }

    .alert-panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-count {
      background: var(--high-dim);
      border: 1px solid rgba(255,59,48,0.25);
      color: var(--high);
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 2px;
    }

    .alert-empty {
      padding: 40px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .alert-list {
      max-height: 340px;
      overflow-y: auto;
    }

    .alert-list::-webkit-scrollbar { width: 4px; }
    .alert-list::-webkit-scrollbar-track { background: transparent; }
    .alert-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: alert-slide-in 0.4s ease;
    }

    @keyframes alert-slide-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .alert-item:hover { background: rgba(255,255,255,0.02); }

    .alert-node-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .tag-A { background: rgba(41,182,246,0.12); color: #29b6f6; border: 1px solid rgba(41,182,246,0.2); }
    .tag-B { background: rgba(171,71,188,0.12); color: #ab47bc; border: 1px solid rgba(171,71,188,0.2); }
    .tag-C { background: rgba(255,167,38,0.12); color: #ffa726; border: 1px solid rgba(255,167,38,0.2); }

    .alert-body { flex: 1; min-width: 0; }

    .alert-source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      margin-bottom: 4px;
    }
    .alert-source-badge.self { color: var(--high); background: var(--high-dim); border: 1px solid rgba(255,59,48,0.2); }
    .alert-source-badge.p2p  { color: var(--blue); background: var(--blue-dim); border: 1px solid rgba(41,182,246,0.2); }

    .alert-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .alert-time {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Flash on update ── */
    @keyframes flash-update {
      0%  { background: rgba(41,182,246,0.08); }
      100%{ background: transparent; }
    }
    .flash { animation: flash-update 0.6s ease-out; }

    /* ── Offline card ── */
    .offline-placeholder {
      text-align: center;
      padding: 16px 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }

    /* ── Footer ── */
    .footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .footer-text {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React

    // ── Helpers ──────────────────────────────────────────────────────────
    function formatTime(iso) {
      if (!iso) return '—'
      const d = new Date(iso)
      return d.toLocaleTimeString('en-US', { hour12: false })
    }

    function formatShortTime(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      const now = new Date()
      const diff = (now - d) / 1000
      if (diff < 60)    return `${Math.floor(diff)}s ago`
      if (diff < 3600)  return `${Math.floor(diff/60)}m ago`
      return formatTime(iso)
    }

    function riskClass(risk) {
      if (!risk) return 'none'
      const r = risk.toLowerCase()
      if (r === 'high')   return 'high'
      if (r === 'medium' || r === 'med') return 'med'
      if (r === 'low')    return 'low'
      return 'none'
    }

    function heartRateAnomaly(hr) {
      if (hr === null || hr === undefined) return ''
      if (hr > 100 || hr < 50) return 'anomaly'
      if (hr > 90  || hr < 60) return 'warning'
      return ''
    }

    function tempAnomaly(t) {
      if (t === null || t === undefined) return ''
      if (t > 38.5 || t < 36.0) return 'anomaly'
      if (t > 37.5 || t < 36.1) return 'warning'
      return ''
    }

    function oxygenAnomaly(o) {
      if (o === null || o === undefined) return ''
      if (o < 92)  return 'anomaly'
      if (o < 95)  return 'warning'
      return ''
    }

    // ── NodeCard ──────────────────────────────────────────────────────────
    function NodeCard({ nodeId, data }) {
      const cardRef = useRef(null)
      const prevData = useRef(null)

      useEffect(() => {
        if (prevData.current && data && cardRef.current) {
          cardRef.current.classList.remove('flash')
          void cardRef.current.offsetWidth
          cardRef.current.classList.add('flash')
        }
        prevData.current = data
      }, [data])

      const online = !!data
      const rc = data ? riskClass(data.risk) : 'offline'

      return (
        <div className={`node-card risk-${rc} ${!online ? 'offline' : ''}`} ref={cardRef}>
          <div className="node-card-bg" />

          <div className="node-header">
            <div className="node-id-block">
              <span className="node-label">P2P Node</span>
              <span className="node-id">{nodeId}</span>
            </div>
            <div className="node-status-block">
              <div className={`live-indicator ${online ? 'online' : 'offline'}`}>
                <div className="live-dot" />
                {online ? 'LIVE' : 'OFFLINE'}
              </div>
              {online && (
                <span className="last-updated">{formatShortTime(data.lastUpdated)}</span>
              )}
            </div>
          </div>

          {!online ? (
            <div className="offline-placeholder">
              Awaiting data stream...
            </div>
          ) : (
            <>
              <div className="vitals">
                <div className="vital-row">
                  <div className="vital-left">
                    <span className="vital-icon">❤️</span>
                    <div className="vital-info">
                      <span className="vital-name">Heart Rate</span>
                      <span className="vital-range">Normal: 60–100</span>
                    </div>
                  </div>
                  <div className="vital-value-block">
                    <span className={`vital-value ${heartRateAnomaly(data.heart_rate)}`}>
                      {data.heart_rate !== undefined ? data.heart_rate.toFixed(1) : '—'}
                    </span>
                    <span className="vital-unit">bpm</span>
                  </div>
                </div>

                <div className="vital-row">
                  <div className="vital-left">
                    <span className="vital-icon">🌡️</span>
                    <div className="vital-info">
                      <span className="vital-name">Temperature</span>
                      <span className="vital-range">Normal: 36.1–37.5</span>
                    </div>
                  </div>
                  <div className="vital-value-block">
                    <span className={`vital-value ${tempAnomaly(data.temperature)}`}>
                      {data.temperature !== undefined ? data.temperature.toFixed(1) : '—'}
                    </span>
                    <span className="vital-unit">°C</span>
                  </div>
                </div>

                <div className="vital-row">
                  <div className="vital-left">
                    <span className="vital-icon">💨</span>
                    <div className="vital-info">
                      <span className="vital-name">Oxygen</span>
                      <span className="vital-range">Normal: ≥ 95%</span>
                    </div>
                  </div>
                  <div className="vital-value-block">
                    <span className={`vital-value ${oxygenAnomaly(data.oxygen_level)}`}>
                      {data.oxygen_level !== undefined ? data.oxygen_level.toFixed(1) : '—'}
                    </span>
                    <span className="vital-unit">%</span>
                  </div>
                </div>
              </div>

              <div className={`risk-badge ${riskClass(data.risk)}`}>
                <span className="risk-label-text">Risk Level</span>
                <span className="risk-level-text">{data.risk || '—'}</span>
              </div>
            </>
          )}
        </div>
      )
    }

    // ── AlertLog ──────────────────────────────────────────────────────────
    function AlertLog({ alerts }) {
      return (
        <div className="alert-panel">
          <div className="alert-panel-header">
            <div className="alert-panel-title">
              ⚠ P2P Alert History
              {alerts.length > 0 && (
                <span className="alert-count">{alerts.length}</span>
              )}
            </div>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 9, color: 'var(--text-dim)', letterSpacing: '0.1em' }}>
              LIVE FEED
            </span>
          </div>

          {alerts.length === 0 ? (
            <div className="alert-empty">No alerts recorded — all nodes nominal</div>
          ) : (
            <div className="alert-list">
              {alerts.map(alert => (
                <div className="alert-item" key={alert.id}>
                  <span className={`alert-node-tag tag-${alert.nodeId}`}>
                    {alert.nodeId}
                  </span>
                  <div className="alert-body">
                    <div>
                      <span className={`alert-source-badge ${alert.source}`}>
                        {alert.source === 'p2p' ? '⟳ P2P' : '⬆ LOCAL'}
                      </span>
                    </div>
                    <div className="alert-msg">{alert.message}</div>
                  </div>
                  <span className="alert-time">{formatTime(alert.timestamp)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )
    }

    // ── Clock ─────────────────────────────────────────────────────────────
    function Clock() {
      const [t, setT] = useState(new Date())
      useEffect(() => {
        const id = setInterval(() => setT(new Date()), 1000)
        return () => clearInterval(id)
      }, [])
      return (
        <span className="sys-time">
          {t.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
          &nbsp;&nbsp;{t.toLocaleTimeString('en-US', { hour12: false })}
        </span>
      )
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [nodes, setNodes]   = useState({ A: null, B: null, C: null })
      const [alerts, setAlerts] = useState([])
      const [wsState, setWsState] = useState('connecting') // connecting | connected | polling | disconnected
      const wsRef = useRef(null)

      const API_BASE = window.location.origin

      // Fetch initial data
      const fetchAll = useCallback(async () => {
        try {
          const [nRes, aRes] = await Promise.all([
            fetch(`${API_BASE}/api/nodes`),
            fetch(`${API_BASE}/api/alerts`)
          ])
          setNodes(await nRes.json())
          setAlerts(await aRes.json())
        } catch (e) {
          console.warn('Fetch failed:', e)
        }
      }, [API_BASE])

      // WebSocket connection
      useEffect(() => {
        fetchAll()

        const wsUrl = API_BASE.replace(/^http/, 'ws')
        let ws
        let pollInterval

        function connect() {
          try {
            ws = new WebSocket(wsUrl)
            wsRef.current = ws

            ws.onopen = () => {
              setWsState('connected')
              if (pollInterval) { clearInterval(pollInterval); pollInterval = null }
            }

            ws.onmessage = (e) => {
              try {
                const msg = JSON.parse(e.data)
                if (msg.type === 'sensor-update') {
                  setNodes(prev => ({ ...prev, [msg.nodeId]: msg.data }))
                } else if (msg.type === 'new-alert') {
                  setAlerts(prev => [msg.alert, ...prev].slice(0, 100))
                }
              } catch {}
            }

            ws.onerror = () => setWsState('polling')

            ws.onclose = () => {
              setWsState('polling')
              // Fall back to polling
              if (!pollInterval) {
                pollInterval = setInterval(fetchAll, 5000)
              }
              // Reconnect after 8s
              setTimeout(connect, 8000)
            }
          } catch {
            setWsState('polling')
            if (!pollInterval) {
              pollInterval = setInterval(fetchAll, 5000)
            }
          }
        }

        connect()

        return () => {
          if (ws) ws.close()
          if (pollInterval) clearInterval(pollInterval)
        }
      }, [fetchAll, API_BASE])

      const activeAlerts = alerts.filter(a => a.source === 'self' || a.source === 'p2p')

      return (
        <>
          <header className="header">
            <div className="header-left">
              <span className="logo">SHT</span>
              <span className="logo-sep">//</span>
              <span className="header-title">Smart Health Tracker</span>
            </div>
            <div className="header-right">
              <div className={`ws-badge ${wsState}`}>
                <div className="pulse-dot" />
                {wsState === 'connected' ? 'WS LIVE'
                 : wsState === 'polling'  ? 'POLLING'
                 : wsState === 'connecting' ? 'CONNECTING'
                 : 'OFFLINE'}
              </div>
              <Clock />
            </div>
          </header>

          <main className="main">
            <div className="section-label">Node Vitals — Real-Time Monitor</div>

            <div className="node-grid">
              {['A', 'B', 'C'].map(id => (
                <NodeCard key={id} nodeId={id} data={nodes[id]} />
              ))}
            </div>

            <div className="section-label">P2P Alert Log</div>
            <AlertLog alerts={activeAlerts} />
          </main>

          <footer className="footer">
            <span className="footer-text">
              SHT-CCSpring26 · Azure IoT Hub · AWS SageMaker · AWS SNS · libp2p
            </span>
            <span className="footer-text">
              {['A', 'B', 'C'].filter(id => nodes[id]).length} / 3 nodes online
            </span>
          </footer>
        </>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
